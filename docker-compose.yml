services:
  simulation:
    build: ./simulation
    ports:
      - "8080:8080"
    environment:
      - ML_SERVICE_URL=http://ml:8090
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      ml:
        condition: service_healthy

  ml:
    build: ./ml
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  agent:
    build: ./agent
    environment:
      - SIM_BASE_URL=http://simulation:8080
      - SIM_WS_URL=ws://simulation:8080/ws
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION=us-west-2
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      simulation:
        condition: service_healthy
