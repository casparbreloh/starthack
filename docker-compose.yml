services:
  simulation:
    build: ./simulation
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s

  agent:
    build: ./agent
    environment:
      - SIM_BASE_URL=http://simulation:8080
      - SIM_WS_URL=ws://simulation:8080/ws
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION=us-west-2
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      simulation:
        condition: service_healthy
